steps:
  # Step 1: Build the Docker image using YOUR Dockerfile
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - build
      - -t
      - 'gcr.io/$PROJECT_ID/dasko:$BUILD_ID'
      - .

  # Step 2: Push the image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - push
      - 'gcr.io/$PROJECT_ID/dasko:$BUILD_ID'

  # Step 3: Deploy to Cloud Run from the built image
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      - gcloud
      - run
      - deploy
      - dasko
      - --image=gcr.io/$PROJECT_ID/dasko:$BUILD_ID
      - --region=us-central1
      - --allow-unauthenticated
      - --min-instances=0
      - --max-instances=3
      - --memory=512Mi
      - --set-env-vars=GEMINI_API_KEY=$$GEMINI_API_KEY
    secretEnv: ['GEMINI_API_KEY']

availableSecrets:
  secretManager:
    - versionName: projects/$PROJECT_ID/secrets/gemini-api-key/versions/latest
      env: 'GEMINI_API_KEY'

images:
  - 'gcr.io/$PROJECT_ID/dasko:$BUILD_ID'

options:
  logging: CLOUD_LOGGING_ONLY
