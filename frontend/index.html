<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dasko</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #fff;
      color: #111827;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── SETUP SCREEN ─────────────────────────────── */
    #setup-screen {
      width: 100%;
      max-width: 400px;
      padding: 2.5rem 1.5rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2.5rem;
    }

    .logo h1 {
      font-size: 2rem;
      font-weight: 600;
      letter-spacing: -0.05em;
      text-align: center;
    }
    .logo p {
      font-size: 0.875rem;
      color: #9CA3AF;
      text-align: center;
      margin-top: 0.3rem;
    }

    .setup-form {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 1.25rem;
    }

    .field-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9CA3AF;
      margin-bottom: 0.45rem;
    }

    select, input[type="text"] {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      font-family: inherit;
      font-size: 0.9375rem;
      color: #111827;
      background: #fff;
      appearance: none;
      outline: none;
      transition: border-color 0.15s;
    }
    select:focus, input[type="text"]:focus { border-color: #FF7355; }

    /* Persona cards */
    .persona-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.625rem;
    }
    .persona-card {
      border: 1.5px solid #E5E7EB;
      border-radius: 12px;
      padding: 1rem 0.5rem 0.875rem;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .persona-card:hover  { border-color: #FDBA9B; background: #FFFAF8; }
    .persona-card.selected { border-color: #FF7355; background: #FFF3EF; }
    .persona-card .emoji { font-size: 1.375rem; display: block; margin-bottom: 0.35rem; }
    .persona-card .pname { font-size: 0.75rem; font-weight: 600; color: #374151; }
    .persona-card .pdesc { font-size: 0.65rem; color: #9CA3AF; margin-top: 0.15rem; line-height: 1.3; }

    #startBtn {
      width: 100%;
      padding: 0.9rem;
      background: #111827;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 500;
      cursor: pointer;
      letter-spacing: -0.01em;
      transition: opacity 0.15s, transform 0.1s;
    }
    #startBtn:hover  { opacity: 0.85; }
    #startBtn:active { transform: scale(0.98); }
    #startBtn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    /* ── SESSION SCREEN ───────────────────────────── */
    #session-screen {
      display: none;
      width: 100%;
      max-width: 400px;
      padding: 2rem 1.5rem 2.5rem;
      flex-direction: column;
      align-items: center;
    }

    .session-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      width: 100%;
      margin-bottom: 3.5rem;
    }
    .session-wordmark {
      font-size: 0.9375rem;
      font-weight: 600;
      letter-spacing: -0.04em;
    }
    #sessionTopicLabel {
      font-size: 0.8rem;
      color: #9CA3AF;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── ORB ──────────────────────────────────────── */
    .orb-stage {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 3rem;
    }

    .orb-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ripple rings — visible only when .rings-on */
    .ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 1.5px solid var(--orb-color, #E5E7EB);
      opacity: 0;
      pointer-events: none;
      transform: scale(0.85);
    }
    .rings-on .ring             { animation: ripple 2s ease-out infinite; }
    .rings-on .ring:nth-child(2){ animation-delay: 0.65s; }
    .rings-on .ring:nth-child(3){ animation-delay: 1.3s; }
    @keyframes ripple {
      0%   { transform: scale(0.85); opacity: 0.5; }
      100% { transform: scale(1.55); opacity: 0; }
    }

    /* The orb itself */
    #orb {
      width: 148px;
      height: 148px;
      border-radius: 50%;
      background: var(--orb-color, #E5E7EB);
      box-shadow: 0 0 50px 4px var(--orb-glow, rgba(229,231,235,0.5));
      transition: background 0.55s ease, box-shadow 0.55s ease;
      animation: orbBreath var(--orb-speed, 3.5s) ease-in-out infinite;
      will-change: transform;
    }
    @keyframes orbBreath {
      0%, 100% { transform: scale(1);    }
      50%       { transform: scale(1.05); }
    }

    /* State label */
    #orbLabel {
      font-size: 0.8125rem;
      color: #9CA3AF;
      margin-top: 1.25rem;
      font-weight: 400;
      letter-spacing: 0.01em;
      min-height: 1.2em;
      transition: opacity 0.3s;
    }

    /* ── MIC DOT ──────────────────────────────────── */
    .mic-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 2.25rem;
    }
    #micDot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #D1D5DB;
      transition: background 0.2s;
    }
    #micDot.active { background: #FF7355; }
    @keyframes dotPulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.35; }
    }
    #micDot.active { animation: dotPulse 1.1s ease-in-out infinite; }
    #micLabel {
      font-size: 0.75rem;
      color: #D1D5DB;
      transition: color 0.2s;
    }
    #micLabel.active { color: #9CA3AF; }

    /* ── CONTROLS ─────────────────────────────────── */
    .session-controls {
      display: flex;
      gap: 0.625rem;
      width: 100%;
    }
    .ctrl-btn {
      flex: 1;
      padding: 0.7rem 0.5rem;
      border: 1.5px solid #E5E7EB;
      border-radius: 10px;
      background: #fff;
      font-family: inherit;
      font-size: 0.8125rem;
      font-weight: 500;
      color: #374151;
      cursor: pointer;
      transition: background 0.15s, border-color 0.15s, color 0.15s;
    }
    .ctrl-btn:hover { background: #F9FAFB; }
    #muteBtn.muted  { border-color: #FF7355; color: #FF7355; }
    #stopBtn        { border-color: #FECACA; color: #EF4444; }
    #stopBtn:hover  { background: #FEF2F2; }

    /* Status */
    #status {
      font-size: 0.75rem;
      color: #E5E7EB;
      text-align: center;
      margin-top: 1.25rem;
      min-height: 1.1em;
    }
    #status.error     { color: #FCA5A5; }
    #status.connected { color: #D1FAE5; }
  </style>
</head>
<body>

  <!-- ── SETUP ────────────────────────────────────── -->
  <div id="setup-screen">
    <div class="logo">
      <h1>Dasko</h1>
      <p>Learn by teaching — your AI student is listening.</p>
    </div>

    <div class="setup-form">
      <div>
        <label class="field-label" for="topic">What are you teaching?</label>
        <select id="topic"><option value="">Loading…</option></select>
      </div>
      <div>
        <label class="field-label" for="customTopic">Or type your own</label>
        <input type="text" id="customTopic" placeholder="e.g. How vaccines work" />
      </div>
      <div>
        <label class="field-label">Choose your student</label>
        <div class="persona-grid">
          <div class="persona-card selected" data-persona="eager">
            <span class="emoji">🙋</span>
            <div class="pname">Eager</div>
            <div class="pdesc">Lots of questions</div>
          </div>
          <div class="persona-card" data-persona="skeptic">
            <span class="emoji">🤨</span>
            <div class="pname">Skeptic</div>
            <div class="pdesc">Needs convincing</div>
          </div>
          <div class="persona-card" data-persona="confused">
            <span class="emoji">😕</span>
            <div class="pname">Confused</div>
            <div class="pdesc">Needs examples</div>
          </div>
        </div>
      </div>
      <button id="startBtn" type="button">Start teaching</button>
    </div>
  </div>

  <!-- ── SESSION ───────────────────────────────────── -->
  <div id="session-screen">
    <div class="session-header">
      <span class="session-wordmark">Dasko</span>
      <span id="sessionTopicLabel"></span>
    </div>

    <div class="orb-stage">
      <div class="orb-wrap" id="orbWrap">
        <div class="ring"></div>
        <div class="ring"></div>
        <div class="ring"></div>
        <div id="orb"></div>
      </div>
      <div id="orbLabel"></div>
    </div>

    <div class="mic-row">
      <div id="micDot"></div>
      <span id="micLabel">mic off</span>
    </div>

    <div class="session-controls">
      <button id="muteBtn"         class="ctrl-btn" type="button">Mute</button>
      <button id="doneSpeakingBtn" class="ctrl-btn" type="button">Done speaking</button>
      <button id="stopBtn"         class="ctrl-btn" type="button">End session</button>
    </div>

    <div id="status"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
